# Render Blueprint — EcoSphere Neural Backend
# =============================================
# Deploy with: "New → Blueprint" on render.com
# Or manually create the services below.

databases:
  - name: ecosphere-db
    plan: free
    databaseName: ecosphere
    user: ecosphere_user

services:
  - type: web
    name: ecosphere-neural-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecosphere-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.8"
